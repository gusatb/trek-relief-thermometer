<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Party With Purpose — Trek Relief</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0c09;
    --surface:  #111410;
    --surface2: #181c15;
    --border:   #252a20;
    --border2:  #303828;
    --green:    #4a6b2a;
    --green-md: #5e8835;
    --green-lt: #7db048;
    --green-gl: #a8d470;
    --amber:    #c8820a;
    --amber-lt: #f0a825;
    --amber-gl: #ffe08a;
    --white:    #edeae0;
    --offwhite: #c8c4b8;
    --muted:    #7a7568;
    --dimmer:   #484540;
    --thermo-a: #4a6b2a;
    --thermo-b: #5e8835;
    --thermo-c: #7db048;
    --thermo-d: #a8d470;
    --thermo-glow: 122, 176, 72;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--white); display: flex; flex-direction: column; }

  /* STARS */
  .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle var(--d,3s) ease-in-out infinite var(--delay,0s); }
  .star.star-right { box-shadow: 0 0 3px rgba(255,248,220,0.55), 0 0 1px rgba(168,212,112,0.35); }
  @keyframes twinkle { 0%,100% { opacity: var(--lo,0.1); } 50% { opacity: var(--hi,0.7); } }

  /* MOUNTAINS */
  .mountains { position: fixed; bottom: 0; left: 0; right: 0; height: 36vh; z-index: 0; pointer-events: none; }

  /* PAGE GRID */
  .page { position: relative; z-index: 1; display: grid; grid-template-rows: auto 1fr auto; width: 100%; height: 100vh; padding: 2vh 3vw; gap: 1.5vh; }

  /* HEADER */
  .header { display: flex; align-items: center; justify-content: space-between; gap: 2rem; padding-bottom: 1.5vh; border-bottom: 1px solid var(--border); }
  .logo-area { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .logo-mark { height: clamp(56px, 7.5vh, 80px); display: flex; align-items: center; flex-shrink: 0; }
  .logo-mark img { height: 100%; width: auto; object-fit: contain; display: block; }
  .header-center { text-align: center; flex: 1; }
  .eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(9px,0.75vw,11px); font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase; color: var(--amber); margin-bottom: 3px; }
  .main-title { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(1.8rem,4.2vw,5rem); font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; line-height: 0.92; color: var(--white); }
  .main-title em { font-style: italic; color: var(--green-lt); }
  .header-right { flex-shrink: 0; text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .live-badge { display: inline-flex; align-items: center; gap: 7px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--green-lt); border: 1px solid var(--green); border-radius: 2px; padding: 5px 12px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green-lt); animation: pulse-dot 1.8s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(0.7); } }
  .status-line { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(10px,0.82vw,12px); letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .status-line.error { color: #e05040; }

  /* CONTENT */
  .content {
    display: grid;
    grid-template-columns: 1.4fr minmax(210px, auto) 1fr;
    gap: 3vw;
    align-items: stretch;
    justify-items: center;
    min-height: 0;
  }
  .content > .left-embedded-map,
  .content > .right-col {
    justify-self: stretch;
    width: 100%;
  }

  /* Center column: goal label + thermometer */
  .thermo-column {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    height: 100%;
    min-height: 0;
    width: 100%;
    max-width: 220px;
  }
  .thermo-goal-head {
    flex-shrink: 0;
    width: 100%;
    text-align: center;
    padding: 0 4px 10px;
    margin-left: clamp(16px, 2.5vw, 36px);
    box-sizing: border-box;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transform: translateY(6px);
    transition: opacity 0.7s ease, max-height 0.7s ease, transform 0.7s ease;
    pointer-events: none;
  }
  .thermo-column.is-goal .thermo-goal-head {
    opacity: 1;
    max-height: 56px;
    transform: translateY(0);
  }
  .thermo-goal-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(1.15rem, 2.4vw, 1.75rem);
    font-weight: 900;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--amber-gl);
    line-height: 1.1;
    text-shadow: 0 0 28px rgba(240, 168, 37, 0.45);
    white-space: nowrap;
  }

  /* LEFT: embedded Dream Map (view-only — /map/embed) */
  .left-embedded-map {
    min-height: 0;
    height: 100%;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border2);
    position: relative;
    background: var(--surface2);
  }
  .left-embedded-map iframe {
    display: block;
    width: 100%;
    height: 100%;
    min-height: 220px;
    border: 0;
  }
  .left-embedded-map::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, rgba(10,12,9,0.2) 0%, transparent 35%, transparent 65%, rgba(10,12,9,0.2) 100%),
      linear-gradient(to bottom, rgba(10,12,9,0.15) 0%, transparent 25%, transparent 75%, rgba(10,12,9,0.25) 100%);
    pointer-events: none;
  }

  /* THERMOMETER — fill color shifts toward gold as progress increases (see applyThermoHeat) */
  .thermo-wrap {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    width: 100%;
    flex: 1;
    min-height: 0;
    position: relative;
  }
  .thermo-celebrate {
    position: absolute;
    left: 40px;
    bottom: 0;
    margin-left: clamp(16px, 2.5vw, 36px);
    transform: translateX(-50%);
    width: 160px;
    height: 100%;
    max-height: 68vh;
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    transition: opacity 2s ease;
    overflow: hidden;
  }
  .thermo-wrap.is-goal .thermo-celebrate { opacity: 1; }
  .thermo-celebrate-halo {
    position: absolute;
    inset: 5% 0 8%;
    background:
      radial-gradient(ellipse 75% 50% at 50% 72%, rgba(240, 168, 37, 0.2), transparent 68%),
      radial-gradient(ellipse 55% 35% at 50% 88%, rgba(168, 212, 112, 0.12), transparent 70%);
    animation: thermo-halo-breathe 11s ease-in-out infinite;
  }
  @keyframes thermo-halo-breathe {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 0.85; transform: scale(1.05); }
  }
  .thermo-spark {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(255, 224, 138, 0.55);
    box-shadow: 0 0 10px rgba(240, 168, 37, 0.35);
    animation: thermo-spark-drift var(--spark-dur, 16s) ease-in-out infinite var(--spark-delay, 0s);
  }
  @keyframes thermo-spark-drift {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.25; }
    50% { transform: translate(var(--spark-x, 8px), var(--spark-y, -24px)) scale(1.2); opacity: 0.65; }
  }
  .thermo-col {
    position: relative;
    z-index: 1;
    width: 80px;
    flex-shrink: 0;
    height: 100%;
    min-height: 280px;
    max-height: 68vh;
    margin-left: clamp(16px, 2.5vw, 36px);
  }
  .tube-bg { position: absolute; left: 50%; transform: translateX(-50%); width: 44px; top: 0; bottom: 76px; border-radius: 22px 22px 0 0; background: var(--surface2); border: 1.5px solid var(--border2); overflow: hidden; }
  .tube-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, var(--thermo-a) 0%, var(--thermo-b) 45%, var(--thermo-c) 80%, var(--thermo-d) 100%);
    transition: height 2s cubic-bezier(0.34, 1.1, 0.64, 1), background 2.5s ease, filter 2.5s ease;
  }
  .tube-fill::after { content: ''; position: absolute; top: 0; left: 7px; width: 6px; bottom: 0; background: rgba(255,255,255,0.11); border-radius: 3px; }
  .tube-glow {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 64px;
    height: 22px;
    background: radial-gradient(ellipse, rgba(var(--thermo-glow), 0.5) 0%, transparent 70%);
    transition: bottom 2s cubic-bezier(0.34, 1.1, 0.64, 1), background 2.5s ease;
    pointer-events: none;
  }
  .bulb-wrap { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 76px; height: 76px; }
  .bulb {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 35%, var(--thermo-c), var(--thermo-a));
    border: 1.5px solid var(--border2);
    position: relative;
    box-shadow: inset 0 -6px 16px rgba(0,0,0,0.6), 0 0 28px rgba(var(--thermo-glow), 0.45);
    animation: bulb-pulse 3s ease-in-out infinite;
    transition: background 2.5s ease, box-shadow 2.5s ease;
  }
  @keyframes bulb-pulse {
    0%, 100% { box-shadow: inset 0 -6px 16px rgba(0,0,0,0.6), 0 0 28px rgba(var(--thermo-glow), 0.45); }
    50% { box-shadow: inset 0 -6px 16px rgba(0,0,0,0.6), 0 0 44px rgba(var(--thermo-glow), 0.65); }
  }
  .bulb-shine { position: absolute; top: 12px; left: 16px; width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,0.22); }

  /* TICKS */
  .ticks-col { flex: 0 0 130px; width: 130px; padding-left: 18px; height: 100%; min-height: 280px; max-height: 68vh; position: relative; }
  .tick { position: absolute; left: 0; right: 0; display: flex; align-items: center; gap: 10px; }
  .tick-dash { width: 12px; height: 1px; background: var(--border2); flex-shrink: 0; }
  .tick-label { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(11px,0.95vw,14px); font-weight: 600; letter-spacing: 0.08em; color: var(--dimmer); white-space: nowrap; text-transform: uppercase; }
  .tick.is-goal .tick-dash { background: var(--amber); width: 18px; }
  .tick.is-goal .tick-label { color: var(--amber-lt); font-weight: 700; }
  .tick.passed .tick-dash { background: var(--green-md); }
  .tick.passed .tick-label { color: var(--green-lt); }

  /* MARKER */
  .marker { position: absolute; left: -5px; display: flex; align-items: center; gap: 9px; transition: bottom 2s cubic-bezier(0.34,1.1,0.64,1); opacity: 0; z-index: 2; }
  .marker.visible { opacity: 1; }
  .marker-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--amber-lt); border: 2px solid var(--bg); box-shadow: 0 0 0 1.5px var(--amber-lt), 0 0 8px rgba(240,168,37,0.6); flex-shrink: 0; }
  .marker-label { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(12px,1vw,15px); font-weight: 800; letter-spacing: 0.06em; color: var(--amber-lt); white-space: nowrap; background: var(--surface); padding: 2px 8px; border-radius: 2px; border: 1px solid rgba(200,130,10,0.4); text-transform: uppercase; transition: color 2s ease, border-color 2s ease, box-shadow 2s ease; }
  .marker.marker--warm .marker-dot { background: var(--thermo-c); box-shadow: 0 0 0 1.5px var(--thermo-d), 0 0 8px rgba(var(--thermo-glow), 0.55); }
  .marker.marker--warm .marker-label { color: var(--thermo-d); border-color: rgba(var(--thermo-glow), 0.45); }

  /* RIGHT COL */
  .right-col {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2vh;
    height: 100%;
    min-height: 0;
    position: relative;
  }
  .right-col::before {
    content: '';
    position: absolute;
    inset: -10% -18% -10% -8%;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 100% 70% at 78% 12%, rgba(255,224,138,0.14) 0%, transparent 42%),
      radial-gradient(ellipse 85% 55% at 100% 45%, rgba(168,212,112,0.1) 0%, transparent 38%),
      radial-gradient(circle at 88% 28%, rgba(255,255,255,0.09) 0%, transparent 22%),
      radial-gradient(circle at 72% 70%, rgba(240,168,37,0.06) 0%, transparent 18%);
    animation: right-sparkle-drift 12s ease-in-out infinite;
  }
  @keyframes right-sparkle-drift {
    0%, 100% { opacity: 0.82; transform: scale(1); }
    33% { opacity: 1; transform: scale(1.02) translateX(-0.3%); }
    66% { opacity: 0.9; transform: scale(1.01) translateX(0.2%); }
  }
  .right-col-inner { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 2vh; min-height: 0; max-height: 100%; width: 100%; }

  /* DONOR LIST (below all figures — TV autoscroll) */
  .donor-panel {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 12px 10px;
  }
  .donor-panel-head {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(9px, 0.72vw, 11px);
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    flex-shrink: 0;
  }
  .donor-list-viewport {
    flex: 1 1 auto;
    min-height: 100px;
    max-height: clamp(120px, 32vh, 420px);
    overflow: hidden;
    position: relative;
    mask-image: linear-gradient(to bottom, transparent, #000 8px, #000 calc(100% - 8px), transparent);
    -webkit-mask-image: linear-gradient(to bottom, transparent, #000 8px, #000 calc(100% - 8px), transparent);
  }
  .donor-list-tape {
    will-change: transform;
  }
  .donor-list-tape.autoscroll {
    animation: donor-tape-scroll linear infinite;
  }
  @keyframes donor-tape-scroll {
    from { transform: translateY(0); }
    to { transform: translateY(-50%); }
  }
  @media (prefers-reduced-motion: reduce) {
    .donor-list-tape.autoscroll { animation: none; }
    .donor-list-viewport.reduced-fallback {
      overflow-y: auto;
      mask-image: none;
      -webkit-mask-image: none;
    }
  }
  .donor-list-segment { padding: 0 2px 0 0; }
  .donor-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: clamp(14px, 1.2vw, 19px);
  }
  .donor-row:last-child { border-bottom: none; padding-bottom: 2px; }
  .donor-name {
    font-family: 'Barlow', sans-serif;
    font-weight: 500;
    color: var(--offwhite);
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .donor-amt {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--green-lt);
    flex-shrink: 0;
  }

  /* HERO AMOUNT */
  .hero-amount { text-align: center; position: relative; }
  .hero-label { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(10px,0.85vw,12px); font-weight: 600; letter-spacing: 0.32em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
  .hero-number { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(3.5rem,8.5vw,9.5rem); font-weight: 900; letter-spacing: -0.01em; line-height: 0.88; color: var(--green-gl); text-shadow: 0 0 60px rgba(122,176,72,0.3); transition: color 2.5s ease, text-shadow 2.5s ease; position: relative; display: inline-block; }
  .hero-number.flash { animation: hero-flash 1.2s ease-out forwards; }
  @keyframes hero-flash {
    0%   { text-shadow: 0 0 60px rgba(122,176,72,0.3); transform: scale(1); }
    15%  { text-shadow: 0 0 120px rgba(168,212,112,1), 0 0 200px rgba(168,212,112,0.5); transform: scale(1.06); }
    40%  { text-shadow: 0 0 80px rgba(168,212,112,0.8); transform: scale(1.02); }
    100% { text-shadow: 0 0 60px rgba(122,176,72,0.3); transform: scale(1); }
  }

  /* DELTA BADGE */
  .delta-badge {
    position: absolute;
    top: -10px; right: -10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(14px,1.4vw,20px); font-weight: 800;
    color: var(--amber-gl);
    text-shadow: 0 0 20px rgba(255,224,138,0.8);
    pointer-events: none;
    opacity: 0;
    animation: delta-float 2.5s ease-out forwards;
    white-space: nowrap;
  }
  @keyframes delta-float {
    0%   { opacity: 0;   transform: translateY(0px)   scale(0.6); }
    15%  { opacity: 1;   transform: translateY(-8px)  scale(1.1); }
    60%  { opacity: 1;   transform: translateY(-36px) scale(1); }
    100% { opacity: 0;   transform: translateY(-60px) scale(0.9); }
  }

  /* PROGRESS BAR */
  .progress-section { display: flex; flex-direction: column; gap: 7px; }
  .progress-labels { display: flex; justify-content: space-between; font-family: 'Barlow Condensed', sans-serif; font-size: clamp(9px,0.82vw,12px); font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
  .progress-labels span:last-child { color: var(--amber); }
  .progress-track { height: 10px; background: var(--surface2); border-radius: 5px; border: 1px solid var(--border2); overflow: hidden; position: relative; }
  .progress-fill {
    height: 100%;
    border-radius: 5px;
    position: relative;
    background: linear-gradient(to right, var(--thermo-a), var(--thermo-c) 70%, var(--thermo-d));
    transition: width 2s cubic-bezier(0.34, 1.1, 0.64, 1), background 2.5s ease;
  }
  .progress-fill::after { content: ''; position: absolute; top: 1px; left: 0; right: 4px; height: 3px; background: rgba(255,255,255,0.18); border-radius: 3px; }
  .progress-fill.shimmer::before {
    content: '';
    position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.35), transparent);
    animation: shimmer-sweep 1s ease-out forwards;
  }
  @keyframes shimmer-sweep { from { left: -60%; } to { left: 110%; } }

  /* STAT ROW */
  .stat-row { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 10px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: clamp(10px,1.1vh,16px) 12px; text-align: center; position: relative; overflow: hidden; transition: border-color 0.4s; }
  .stat::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--border2); transition: background 0.5s; }
  .stat.hi::before { background: linear-gradient(to right, var(--green), var(--green-lt)); }
  .stat.pulse-green { animation: stat-pulse-green 1s ease-out; }
  @keyframes stat-pulse-green {
    0%   { box-shadow: 0 0 0 0 rgba(122,176,72,0); border-color: var(--border); }
    30%  { box-shadow: 0 0 0 6px rgba(122,176,72,0.35); border-color: var(--green-lt); }
    100% { box-shadow: 0 0 0 0 rgba(122,176,72,0); border-color: var(--border); }
  }
  .stat-label { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(9px,0.72vw,11px); font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
  .stat-value { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(1.3rem,2.6vw,3rem); font-weight: 800; letter-spacing: 0.02em; color: var(--white); transition: color 0.3s; }
  .stat-value.green { color: var(--green-lt); }
  .stat-value.amber { color: var(--amber-lt); }

  /* FOOTER */
  .footer { display: flex; align-items: center; justify-content: space-between; padding-top: 1.5vh; border-top: 1px solid var(--border); gap: 1rem; }
  .spinner { display: inline-block; width: 11px; height: 11px; border: 1.5px solid var(--border2); border-top-color: var(--green-lt); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* RIPPLE OVERLAY */
  .ripple-overlay {
    position: fixed; inset: 0; z-index: 98; pointer-events: none;
    border-radius: 0;
    background: radial-gradient(ellipse at center, rgba(122,176,72,0.18) 0%, transparent 70%);
    opacity: 0;
  }
  .ripple-overlay.fire { animation: ripple-flash 1.4s ease-out forwards; }
  @keyframes ripple-flash {
    0%   { opacity: 0; transform: scale(0.3); }
    20%  { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.4); }
  }

  /* MILESTONE OVERLAY */
  .milestone-overlay { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; pointer-events: none; opacity: 0; transition: opacity 0.5s; background: rgba(10,12,9,0.6); }
  .milestone-overlay.show { opacity: 1; }

<script>
const GOAL = 10000;
const MILESTONE_MSGS = {25:'Keep it going!', 50:'Halfway there!', 75:'Almost there!', 100:'Goal reached!'};

let triggered  = new Set();
let lastRaised = -1;
let tubePx     = 300;

window.donorList = [];

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatDonorCurrency(d) {
  const c = (d.currency || 'usd').toLowerCase();
  if (c === 'usd') return '$' + Number(d.amount).toLocaleString();
  return (d.currency || '').toUpperCase() + ' ' + Number(d.amount).toLocaleString();
}

function formatCelebrationAmount(d) {
  const c = (d.currency || 'usd').toLowerCase();
  if (c === 'usd') {
    return Number(d.amount).toLocaleString('en-US', { style: 'currency', currency: 'USD' });
  }
  return String(d.currency || '').toUpperCase() + ' ' + Number(d.amount).toLocaleString(undefined, {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function donorFingerprint(d) {
  const name = ((d.name || '') + '').trim().toLowerCase();
  return name + '|' + Number(d.amount) + '|' + String(d.currency || 'usd').toLowerCase();
}

/** Union of all donors ever seen from the API; empty/failed payloads do not remove entries. */
function mergeDonorSnapshots(incoming) {
  const registry = new Map();
  (window.donorList || []).forEach((d) => {
    registry.set(donorFingerprint(d), d);
  });
  const list = Array.isArray(incoming) ? incoming : [];
  list.forEach((d) => {
    registry.set(donorFingerprint(d), d);
  });
  return Array.from(registry.values());
}

let donorCelebrationsPrimed = false;
const NEW_DONOR_CELEBRATION_MS = 5200;
let newDonorHideTimer = null;
let newDonorQueue = [];
let newDonorPlaying = false;

function enqueueNewDonorCelebration(donor) {
  newDonorQueue.push(donor);
  pumpNewDonorQueue();
}

function pumpNewDonorQueue() {
  if (newDonorPlaying || newDonorQueue.length === 0) return;
  newDonorPlaying = true;
  const donor = newDonorQueue.shift();
  playNewDonorCelebration(donor, () => {
    newDonorPlaying = false;
    pumpNewDonorQueue();
  });
}

function playNewDonorCelebration(donor, onDone) {
  const ov = document.getElementById('new-donor-overlay');
  const nameEl = document.getElementById('new-donor-name');
  const amtEl = document.getElementById('new-donor-amount');
  const host = document.getElementById('new-donor-confetti-host');
  if (!ov || !nameEl || !amtEl) {
    if (onDone) onDone();
    return;
  }

  clearTimeout(newDonorHideTimer);
  const nm = ((donor.name || '') + '').trim() || 'Anonymous';
  nameEl.textContent = nm;
  amtEl.textContent = formatCelebrationAmount(donor);

  ov.setAttribute('aria-hidden', 'false');
  ov.classList.remove('show');
  void ov.offsetWidth;
  ov.classList.add('show');

  const ripple = document.getElementById('ripple-overlay');
  if (ripple) {
    ripple.classList.remove('fire');
    void ripple.offsetWidth;
    ripple.classList.add('fire');
  }

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const celebrationMs = reduceMotion ? 2800 : NEW_DONOR_CELEBRATION_MS;
  const confettiN = reduceMotion ? 48 : 150;

  if (host) {
    host.innerHTML = '';
    spawnConfetti(confettiN, host);
  } else {
    spawnConfetti(confettiN);
  }

  if (!reduceMotion) {
    for (let i = 0; i < 18; i++) setTimeout(() => spawnDollarParticle(), i * 95);
  }

  newDonorHideTimer = setTimeout(() => {
    ov.classList.remove('show');
    ov.setAttribute('aria-hidden', 'true');
    if (host) host.innerHTML = '';
    if (onDone) onDone();
  }, celebrationMs);
}

function renderDonorList(donors) {
  const inner = document.getElementById('donor-list-inner');
  if (!inner) return;
  inner.innerHTML = '';
  if (!donors.length) {
    const empty = document.createElement('div');
    empty.className = 'donor-row';
    empty.innerHTML = '<span class="donor-name" style="color:var(--muted)">No donations yet</span>';
    inner.appendChild(empty);
    refreshDonorMarquee();
    return;
  }
  donors.forEach((d) => {
    const row = document.createElement('div');
    row.className = 'donor-row';
    row.setAttribute('role', 'listitem');
    const name = ((d.name || '') + '').trim() || 'Anonymous';
    row.innerHTML =
      '<span class="donor-name" title="' + escapeHtml(name) + '">' + escapeHtml(name) + '</span>' +
      '<span class="donor-amt">' + escapeHtml(formatDonorCurrency(d)) + '</span>';
    inner.appendChild(row);
  });
  refreshDonorMarquee();
}

let donorMarqueeRaf = null;
function refreshDonorMarquee() {
  const viewport = document.getElementById('donor-list-viewport');
  const tape = document.getElementById('donor-list-tape');
  const segA = document.getElementById('donor-list-inner');
  const segB = document.getElementById('donor-list-clone');
  if (!viewport || !tape || !segA || !segB) return;

  cancelAnimationFrame(donorMarqueeRaf);
  donorMarqueeRaf = requestAnimationFrame(() => {
    donorMarqueeRaf = requestAnimationFrame(() => {
      donorMarqueeRaf = null;
      tape.classList.remove('autoscroll');
      tape.style.animationDuration = '';
      segB.innerHTML = '';
      void tape.offsetWidth;

      const vh = viewport.clientHeight;
      const sh = segA.offsetHeight;
      const list = window.donorList;
      if (!list || !list.length || sh < 8) {
        viewport.classList.remove('reduced-fallback');
        return;
      }
      if (sh <= vh + 2) {
        viewport.classList.remove('reduced-fallback');
        return;
      }

      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        viewport.classList.add('reduced-fallback');
        return;
      }
      viewport.classList.remove('reduced-fallback');

      segB.innerHTML = segA.innerHTML;
      void tape.offsetWidth;
      const pxPerSec = 40;
      const duration = Math.max(20, sh / pxPerSec);
      tape.style.animationDuration = duration + 's';
      tape.classList.add('autoscroll');
    });
  });
}

/* ── STARS ── */
function buildStars() {
  const wrap = document.getElementById('stars');
  for (let i = 0; i < 130; i++) {
    const s  = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.2 + 0.4;
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*62}%;width:${sz}px;height:${sz}px;--d:${(Math.random()*4+2).toFixed(1)}s;--delay:-${(Math.random()*6).toFixed(1)}s;--lo:${(Math.random()*0.12+0.04).toFixed(2)};--hi:${(Math.random()*0.55+0.25).toFixed(2)}`;
    wrap.appendChild(s);
  }
  /* Extra twinkle biased to the right (thermometer totals column) */
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.className = 'star star-right';
    const sz = Math.random() * 1.6 + 0.25;
    const left = 52 + Math.random() * 48;
    const hi = (Math.random() * 0.35 + 0.45).toFixed(2);
    s.style.cssText =
      `left:${left}%;top:${Math.random() * 68}%;width:${sz}px;height:${sz}px;` +
      `--d:${(Math.random() * 3 + 1.8).toFixed(1)}s;--delay:-${(Math.random() * 7).toFixed(1)}s;` +
      `--lo:${(Math.random() * 0.1 + 0.06).toFixed(2)};--hi:${hi}`;
    wrap.appendChild(s);
  }
}

/* ── TICKS ── */
function calcTubePx() {
  const tube = document.querySelector('.tube-bg');
  if (tube) return tube.offsetHeight;
  const col = document.getElementById('thermo-col');
  return col ? col.offsetHeight - 76 : 300;
}

function buildTicks() {
  const col = document.getElementById('ticks-col');
  col.querySelectorAll('.tick').forEach(t => t.remove());
  tubePx = calcTubePx();

  const thermo = document.getElementById('thermo-col');
  if (thermo) col.style.height = thermo.offsetHeight + 'px';

  [0, 2500, 5000, 7500, 10000].forEach(v => {
    const el = document.createElement('div');
    el.className = 'tick' + (v === GOAL ? ' is-goal' : '');
    el.id = 'tick-' + v;
    el.style.bottom = (76 + (v / GOAL * tubePx)) + 'px';
    el.innerHTML = '<div class="tick-dash"></div><span class="tick-label">'
      + (v === 0 ? '$0' : '$' + (v/1000) + 'k')
      + (v === GOAL ? ' — goal' : '') + '</span>';
    col.appendChild(el);
  });
}

/* ── INCREASE ANIMATIONS ── */
function fireIncreaseAnimations(oldVal, newVal) {
  const delta = newVal - oldVal;
  if (delta <= 0) return;

  const ripple = document.getElementById('ripple-overlay');
  ripple.classList.remove('fire');
  void ripple.offsetWidth; 
  ripple.classList.add('fire');
  setTimeout(() => ripple.classList.remove('fire'), 1500);

  const hero = document.getElementById('hero-number');
  hero.classList.remove('flash');
  void hero.offsetWidth;
  hero.classList.add('flash');
  setTimeout(() => hero.classList.remove('flash'), 1300);

  const badge = document.createElement('div');
  badge.className = 'delta-badge';
  badge.textContent = '+$' + delta.toLocaleString();
  hero.parentElement.appendChild(badge);
  setTimeout(() => badge.remove(), 2600);

  const fill = document.getElementById('progress-fill');
  fill.classList.remove('shimmer');
  void fill.offsetWidth;
  fill.classList.add('shimmer');
  setTimeout(() => fill.classList.remove('shimmer'), 1100);

  ['stat-raised', 'stat-remain'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('pulse-green');
    void el.offsetWidth;
    el.classList.add('pulse-green');
    setTimeout(() => el.classList.remove('pulse-green'), 1100);
  });

  const count = Math.min(8, Math.max(3, Math.floor(delta / 50)));
  for (let i = 0; i < count; i++) {
    setTimeout(() => spawnDollarParticle(), i * 120);
  }

  spawnConfetti(28);
}

const THERMO_GREEN = { a: '#4a6b2a', b: '#5e8835', c: '#7db048', d: '#a8d470', glow: '122, 176, 72' };
const THERMO_GOLD  = { a: '#7a5218', b: '#c8820a', c: '#f0a825', d: '#ffe08a', glow: '240, 168, 37' };
let thermoSparksBuilt = false;

function lerpHex(c1, c2, t) {
  const p = (h) => {
    const x = h.replace('#', '');
    return [parseInt(x.slice(0, 2), 16), parseInt(x.slice(2, 4), 16), parseInt(x.slice(4, 6), 16)];
  };
  const a = p(c1), b = p(c2);
  const r = Math.round(a[0] + (b[0] - a[0]) * t);
  const g = Math.round(a[1] + (b[1] - a[1]) * t);
  const bl = Math.round(a[2] + (b[2] - a[2]) * t);
  return '#' + [r, g, bl].map((n) => n.toString(16).padStart(2, '0')).join('');
}

function lerpRgbStr(s1, s2, t) {
  const a = s1.split(',').map((x) => Number(x.trim()));
  const b = s2.split(',').map((x) => Number(x.trim()));
  return a.map((v, i) => Math.round(v + (b[i] - v) * t)).join(', ');
}

function applyThermoHeat(pctFill) {
  const t = Math.min(1, Math.max(0, pctFill));
  const heat = t < 0.3 ? (t / 0.3) * 0.25 : 0.25 + ((t - 0.3) / 0.7) * 0.75;
  const root = document.documentElement;
  root.style.setProperty('--thermo-a', lerpHex(THERMO_GREEN.a, THERMO_GOLD.a, heat));
  root.style.setProperty('--thermo-b', lerpHex(THERMO_GREEN.b, THERMO_GOLD.b, heat));
  root.style.setProperty('--thermo-c', lerpHex(THERMO_GREEN.c, THERMO_GOLD.c, heat));
  root.style.setProperty('--thermo-d', lerpHex(THERMO_GREEN.d, THERMO_GOLD.d, heat));
  root.style.setProperty('--thermo-glow', lerpRgbStr(THERMO_GREEN.glow, THERMO_GOLD.glow, heat));

  const hero = document.getElementById('hero-number');
  if (hero) {
    const glow = 0.3 + heat * 0.5;
    hero.style.color = lerpHex('#a8d470', '#ffe08a', heat);
    hero.style.textShadow =
      '0 0 ' + Math.round(40 + heat * 50) + 'px rgba(' + lerpRgbStr(THERMO_GREEN.glow, THERMO_GOLD.glow, heat) + ',' + glow + ')';
  }

  const marker = document.getElementById('marker');
  if (marker) marker.classList.toggle('marker--warm', heat > 0.55);
}

function ensureThermoSparks() {
  if (thermoSparksBuilt) return;
  const host = document.getElementById('thermo-celebrate');
  if (!host) return;
  const positions = [
    { left: '18%', bottom: '22%', x: '6px', y: '-18px', dur: '14s', delay: '0s' },
    { left: '72%', bottom: '28%', x: '-8px', y: '-22px', dur: '17s', delay: '2s' },
    { left: '42%', bottom: '48%', x: '4px', y: '-14px', dur: '13s', delay: '4s' },
    { left: '58%', bottom: '62%', x: '-5px', y: '-20px', dur: '19s', delay: '1s' },
    { left: '30%', bottom: '70%', x: '7px', y: '-16px', dur: '15s', delay: '3s' },
    { left: '65%', bottom: '78%', x: '-6px', y: '-12px', dur: '18s', delay: '5s' },
  ];
  positions.forEach(function (pos) {
    const s = document.createElement('div');
    s.className = 'thermo-spark';
    s.style.left = pos.left;
    s.style.bottom = pos.bottom;
    s.style.setProperty('--spark-x', pos.x);
    s.style.setProperty('--spark-y', pos.y);
    s.style.setProperty('--spark-dur', pos.dur);
    s.style.setProperty('--spark-delay', pos.delay);
    host.appendChild(s);
  });
  thermoSparksBuilt = true;
}

function setThermoGoalCelebration(active) {
  const column = document.getElementById('thermo-column');
  const wrap = document.getElementById('thermo-wrap');
  const head = document.getElementById('thermo-goal-head');
  const tube = document.getElementById('tube-fill');
  const bulb = document.querySelector('.bulb');
  if (column) column.classList.toggle('is-goal', active);
  if (wrap) wrap.classList.toggle('is-goal', active);
  if (head) head.setAttribute('aria-hidden', active ? 'false' : 'true');
  if (tube) tube.classList.toggle('goal-reached', active);
  if (bulb) bulb.classList.toggle('goal-reached', active);
  if (active) ensureThermoSparks();
}

/* ── CONFETTI ── */
function spawnConfetti(n, parentEl) {
  const wrap = parentEl || document.getElementById('confetti-wrap');
  if (!wrap) return;
  const cols = ['#7db048','#a8d470','#f0a825','#ffe08a','#fff','#4a6b2a','#c8820a','#edeae0'];
  for (let i = 0; i < n; i++) {
    const p   = document.createElement('div');
    p.className = 'confetti-p';
    const dur = (Math.random() * 2 + 1.5).toFixed(2);
    p.style.cssText = `left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};width:${Math.random()*8+4}px;height:${Math.random()*8+4}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${dur}s;animation-delay:${(Math.random()*0.9).toFixed(2)}s`;
    wrap.appendChild(p);
    setTimeout(() => p.remove(), (parseFloat(dur)+1.2)*1000);
  }
}

function updateDisplay(raised) {
  tubePx = calcTubePx();
  const pct     = raised / GOAL;
  const pctInt  = Math.round(pct * 100);
  const pctFill = Math.min(pct, 1);
  const goalHit = raised >= GOAL;

  applyThermoHeat(pctFill);
  setThermoGoalCelebration(goalHit);

  document.getElementById('tube-fill').style.height = (pctFill * 100) + '%';
  const glowBot = 76 + pctFill * tubePx - 11;
  document.getElementById('tube-glow').style.bottom = Math.max(76, glowBot) + 'px';

  document.getElementById('hero-number').textContent = '$' + raised.toLocaleString();

  document.getElementById('progress-fill').style.width = (pctFill * 100) + '%';
  document.getElementById('prog-label').textContent = goalHit
    ? pctInt + '% · Goal Exceeded! 🎉'
    : pctInt + '% of goal';

  document.getElementById('s-raised').textContent = '$' + raised.toLocaleString();

  const remainEl      = document.getElementById('s-remain');
  const remainLabelEl = document.getElementById('s-remain-label');
  if (goalHit) {
    const over = raised - GOAL;
    if (remainLabelEl) remainLabelEl.textContent = 'Exceeded By';
    if (remainEl) remainEl.textContent = '+$' + over.toLocaleString();
  } else {
    if (remainLabelEl) remainLabelEl.textContent = 'Remaining';
    if (remainEl) remainEl.textContent = '$' + (GOAL - raised).toLocaleString();
  }

  const marker = document.getElementById('marker');
  document.getElementById('marker-label').textContent = '$' + raised.toLocaleString();
  marker.style.bottom = (76 + Math.min(pctFill, 0.964) * tubePx) + 'px';
  marker.classList.add('visible');

  [0, 2500, 5000, 7500].forEach(v => {
    const t = document.getElementById('tick-' + v);
    if (t) t.classList.toggle('passed', raised >= v);
  });

  const crossingGoal = lastRaised >= 0 && lastRaised < GOAL && raised >= GOAL;

  if (lastRaised >= 0 && raised > lastRaised && !crossingGoal) {
    fireIncreaseAnimations(lastRaised, raised);
  }

  [25, 50, 75, 100].forEach(m => {
    if (pctInt >= m && !triggered.has(m) && lastRaised >= 0) {
      triggered.add(m);
      showMilestone(m, raised);
    }
  });

  lastRaised = raised;
}

/* ── MILESTONE ── */
function showMilestone(pct, raisedAmt) {
  if (pct === 100) {
    if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      spawnConfetti(36);
    }
    return;
  }
  const ov = document.getElementById('milestone-overlay');
  document.getElementById('milestone-pct').textContent = pct + '%';
  document.getElementById('milestone-msg').textContent = MILESTONE_MSGS[pct] || 'Amazing!';
  ov.classList.add('show');
  spawnConfetti(80);
  setTimeout(() => ov.classList.remove('show'), 3800);
}

function spawnDollarParticle() {
  const p   = document.createElement('div');
  p.className = 'dollar-particle';
  const x   = 10 + Math.random() * 80;
  const sz  = Math.random() * 32 + 20;
  const dur = (Math.random() * 1.5 + 1.8).toFixed(2);
  const rise  = -(100 + Math.random() * 150) + 'px';
  const rise2 = -(180 + Math.random() * 100) + 'px';
  const rot   = (Math.random() * 20 - 10) + 'deg';
  const rot2  = (Math.random() * 30 - 15) + 'deg';
  p.style.cssText = `left:${x}vw;top:${30 + Math.random()*40}vh;font-size:${sz}px;animation-duration:${dur}s;--rise:${rise};--rise2:${rise2};--rot:${rot};--rot2:${rot2}`;
  p.textContent = ['$','✦','★','✨','🎉','💚','🏔'][Math.floor(Math.random()*7)];
  document.body.appendChild(p);
  setTimeout(() => p.remove(), parseFloat(dur) * 1000 + 300);
}

/* ── WEBSOCKET CONNECTION ── */
let ws;

function connectWebSocket() {
  const statusEl = document.getElementById('status-line');
  statusEl.className = 'status-line';
  statusEl.innerHTML = '<span class="spinner"></span><span>Connecting...</span>';

  const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(wsProto + '//' + location.host + '/');

  ws.onopen = () => {
    console.log('Connected to thermometer server');
    statusEl.innerHTML = '<span>&#128994; Connected (Live)</span>';
    statusEl.classList.remove('error');
  };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.donors && Array.isArray(data.donors)) {
        const incoming = data.donors;
        // Never wipe a populated list with an empty payload (connection errors / older server).
        if (incoming.length === 0 && (window.donorList || []).length > 0) {
          console.warn('Thermometer: ignoring empty donor snapshot');
          return;
        }
        const prevFp = new Set((window.donorList || []).map(donorFingerprint));
        const newcomers = [];
        if (donorCelebrationsPrimed && incoming.length) {
          for (let i = 0; i < incoming.length; i++) {
            const d = incoming[i];
            if (!prevFp.has(donorFingerprint(d))) newcomers.push(d);
          }
        }

        window.donorList = mergeDonorSnapshots(incoming);
        if (incoming.length) donorCelebrationsPrimed = true;

        renderDonorList(window.donorList);
        const totalRaised = window.donorList.reduce((sum, donor) => sum + donor.amount, 0);
        updateDisplay(totalRaised);

        if (donorCelebrationsPrimed && newcomers.length) {
          newcomers.forEach((d) => {
            enqueueNewDonorCelebration(d);
            if (window.TrekThermometerBridge) {
              TrekThermometerBridge.postDonationSpotlight(d);
            }
          });
        }
      }
    } catch (e) {
      console.error("Error parsing WebSocket message:", e);
    }
  };

  ws.onclose = () => {
    console.log('Connection lost. Reconnecting...');
    statusEl.className = 'status-line error';
    statusEl.innerHTML = '<span>&#9888; Reconnecting...</span>';
    setTimeout(connectWebSocket, 3000);
  };

  ws.onerror = (err) => {
    console.error('WebSocket Error:', err);
    ws.close();
  };
}
