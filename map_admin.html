<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trek Relief | Dream Data Viewer</title>

    <!-- Pico.css for clean styling -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

    <style>
        body {
            background: #f4f1ea;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        #count {
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            color: #27ae60;
            font-weight: bold;
        }
        table tbody tr:hover {
            background: #f1f1f1;
        }
        td {
            vertical-align: middle;
        }

        .btn-delete {
            background: #c0392b;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            font-weight: bold;
        }
        .btn-delete:hover {
            background: #e74c3c;
        }

        .btn-export {
            display: block;
            margin: 0 auto 20px auto;
            background: #27ae60;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 700;
        }
        .btn-export:hover {
            background: #2ecc71;
        }
    </style>
</head>

<body>

    <h1>Trek Relief – Dream With Purpose Data</h1>
    <div id="count">Loading…</div>

    <!-- CSV Export Button -->
    <button class="btn-export" onclick="exportCSV()">⬇️ Export CSV</button>

    <table role="grid">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Dream Location</th>
                <th>Cheers</th>
                <th>Latitude</th>
                <th>Longitude</th>
                <th>Submitted</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody id="pin-table"></tbody>
    </table>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://dxwyqrmorjlmnuuychfn.supabase.co";
        const SUPABASE_KEY = "sb_publishable_8MS3E7SW33zJwTmhXO5YBQ_CTwdxeGC";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let cachedPins = [];

        async function deletePin(id) {
            if (!confirm("Are you sure you want to delete this dream?")) return;

            const { error } = await supabaseClient
                .from("map_pins")
                .delete()
                .eq("id", id);

            if (error) {
                alert("Delete failed: " + error.message);
                return;
            }

            loadPins(); // refresh table after deletion
        }

        function exportCSV() {
            if (!cachedPins.length) return alert("No data to export!");

            let csv = "name,email,location,cheers,latitude,longitude,created_at\n";

            cachedPins.forEach(pin => {
                csv += `"${pin.name}","${pin.email}","${pin.location_name}",${pin.cheer_count ?? 0},${pin.latitude},${pin.longitude},"${pin.created_at}"\n`;
            });

            const blob = new Blob([csv], { type: "text/csv" });
            const link = document.createElement("a");

            link.href = URL.createObjectURL(blob);
            link.download = "trek_relief_dreams.csv";
            link.click();
        }

        async function loadPins() {
            const table = document.getElementById("pin-table");
            const countBox = document.getElementById("count");

            table.innerHTML = "<tr><td colspan='8'>Fetching data…</td></tr>";

            let { data, error } = await supabaseClient
                .from("map_pins")
                .select("*")
                .order("id", { ascending: false });

            if (error) {
                table.innerHTML = `<tr><td colspan='8'>Error loading data: ${error.message}</td></tr>`;
                return;
            }

            const cheerByPin = {};
            const { data: shareRows, error: shareErr } = await supabaseClient
                .from("map_pin_shares")
                .select("pin_id");
            if (!shareErr && shareRows) {
                shareRows.forEach((r) => {
                    const k = r.pin_id;
                    cheerByPin[k] = (cheerByPin[k] || 0) + 1;
                });
            }

            cachedPins = data.map((p) => ({
                ...p,
                cheer_count: cheerByPin[p.id] || 0,
            }));
            const cheerTotal = Object.values(cheerByPin).reduce((a, b) => a + b, 0);
            countBox.textContent = `${data.length} dreams · ${cheerTotal} cheers`;
            table.innerHTML = "";

            data.forEach((pin) => {
                const row = document.createElement("tr");
                const cheers = cheerByPin[pin.id] || 0;

                row.innerHTML = `
                    <td>${pin.name}</td>
                    <td>${pin.email || ""}</td>
                    <td>${pin.location_name}</td>
                    <td>${cheers}</td>
                    <td>${pin.latitude.toFixed(4)}</td>
                    <td>${pin.longitude.toFixed(4)}</td>
                    <td>${new Date(pin.created_at).toLocaleString()}</td>
                    <td><button class="btn-delete" onclick="deletePin(${pin.id})">Delete</button></td>
                `;

                table.appendChild(row);
            });
        }

        loadPins();
    </script>

</body>
</html>
