<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trek Relief | Dream Data Viewer</title>

    <!-- Pico.css for clean styling -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

    <style>
        body {
            background: #f4f1ea;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        #count {
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            color: #27ae60;
            font-weight: bold;
        }
        table tbody tr:hover {
            background: #f1f1f1;
        }
        td {
            vertical-align: middle;
        }

        .btn-delete {
            background: #c0392b;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            font-weight: bold;
        }
        .btn-delete:hover {
            background: #e74c3c;
        }

        .btn-export {
            display: block;
            margin: 0 auto 20px auto;
            background: #27ae60;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 700;
        }
        .btn-export:hover {
            background: #2ecc71;
        }

        .cheer-name-input {
            width: 100%;
            min-width: 120px;
            margin: 0;
            padding: 4px 8px;
            font-size: 14px;
        }

        .cheer-name-hint {
            font-size: 11px;
            color: #7f8c8d;
            display: block;
            margin-top: 2px;
        }

        h2.section-title {
            text-align: center;
            color: #2c3e50;
            margin: 2.5rem 0 0.5rem;
        }

        #cheer-count {
            text-align: center;
            font-size: 16px;
            margin-bottom: 16px;
            color: #566573;
        }
    </style>
</head>

<body>

    <h1>Trek Relief – Dream With Purpose Data</h1>
    <div id="count">Loading…</div>

    <!-- CSV Export Button -->
    <button class="btn-export" onclick="exportCSV()">⬇️ Export CSV</button>

    <table role="grid">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Dream Location</th>
                <th>Cheers</th>
                <th>Latitude</th>
                <th>Longitude</th>
                <th>Submitted</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody id="pin-table"></tbody>
    </table>

    <h2 class="section-title">Cheers</h2>
    <div id="cheer-count">Loading cheers…</div>

    <table role="grid">
        <thead>
            <tr>
                <th>Dream</th>
                <th>Dream Location</th>
                <th>Cheered By</th>
                <th>Submitted</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody id="cheer-table"></tbody>
    </table>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://dxwyqrmorjlmnuuychfn.supabase.co";
        const SUPABASE_KEY = "sb_publishable_8MS3E7SW33zJwTmhXO5YBQ_CTwdxeGC";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let cachedPins = [];
        let cachedShares = [];

        function escapeHtml(s) {
            return String(s ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        async function deleteCheer(id) {
            if (!confirm("Delete this cheer?")) return;

            const { error } = await supabaseClient
                .from("map_pin_shares")
                .delete()
                .eq("id", id);

            if (error) {
                alert("Delete failed: " + error.message);
                return;
            }

            await loadAll();
        }

        async function updateCheerName(id, name) {
            const trimmed = String(name || "").trim();
            if (!trimmed) {
                alert("Name cannot be empty.");
                return;
            }

            const { data, error } = await supabaseClient
                .from("map_pin_shares")
                .update({ shared_by: trimmed })
                .eq("id", id)
                .select("id, shared_by");

            if (error) {
                alert("Update failed: " + error.message);
                return;
            }
            if (!data || !data.length) {
                alert(
                    "Update failed — no row updated. Run the UPDATE policy in map_pin_shares.sql in Supabase."
                );
                return;
            }

            await loadShares();
        }

        async function deletePin(id) {
            if (!confirm("Are you sure you want to delete this dream?")) return;

            const { error } = await supabaseClient
                .from("map_pins")
                .delete()
                .eq("id", id);

            if (error) {
                alert("Delete failed: " + error.message);
                return;
            }

            await loadAll();
        }

        function exportCSV() {
            if (!cachedPins.length) return alert("No data to export!");

            let csv = "name,email,location,cheers,latitude,longitude,created_at\n";

            cachedPins.forEach(pin => {
                csv += `"${pin.name}","${pin.email}","${pin.location_name}",${pin.cheer_count ?? 0},${pin.latitude},${pin.longitude},"${pin.created_at}"\n`;
            });

            const blob = new Blob([csv], { type: "text/csv" });
            const link = document.createElement("a");

            link.href = URL.createObjectURL(blob);
            link.download = "trek_relief_dreams.csv";
            link.click();
        }

        async function loadPins() {
            const table = document.getElementById("pin-table");
            const countBox = document.getElementById("count");

            table.innerHTML = "<tr><td colspan='8'>Fetching data…</td></tr>";

            let { data, error } = await supabaseClient
                .from("map_pins")
                .select("*")
                .order("id", { ascending: false });

            if (error) {
                table.innerHTML = `<tr><td colspan='8'>Error loading data: ${error.message}</td></tr>`;
                return;
            }

            const cheerByPin = {};
            const { data: shareRows, error: shareErr } = await supabaseClient
                .from("map_pin_shares")
                .select("pin_id");
            if (!shareErr && shareRows) {
                shareRows.forEach((r) => {
                    const k = r.pin_id;
                    cheerByPin[k] = (cheerByPin[k] || 0) + 1;
                });
            }

            cachedPins = data.map((p) => ({
                ...p,
                cheer_count: cheerByPin[p.id] || 0,
            }));
            const cheerTotal = Object.values(cheerByPin).reduce((a, b) => a + b, 0);
            countBox.textContent = `${data.length} dreams · ${cheerTotal} cheers`;
            table.innerHTML = "";

            data.forEach((pin) => {
                const row = document.createElement("tr");
                const cheers = cheerByPin[pin.id] || 0;

                row.innerHTML = `
                    <td>${pin.name}</td>
                    <td>${pin.email || ""}</td>
                    <td>${pin.location_name}</td>
                    <td>${cheers}</td>
                    <td>${pin.latitude.toFixed(4)}</td>
                    <td>${pin.longitude.toFixed(4)}</td>
                    <td>${new Date(pin.created_at).toLocaleString()}</td>
                    <td><button class="btn-delete" onclick="deletePin(${pin.id})">Delete</button></td>
                `;

                table.appendChild(row);
            });

            await loadShares();
        }

        async function loadShares() {
            const table = document.getElementById("cheer-table");
            const cheerCountBox = document.getElementById("cheer-count");

            table.innerHTML = "<tr><td colspan='5'>Fetching cheers…</td></tr>";

            const { data, error } = await supabaseClient
                .from("map_pin_shares")
                .select("id, pin_id, shared_by, created_at, map_pins(name, location_name)")
                .order("id", { ascending: false });

            if (error) {
                table.innerHTML =
                    "<tr><td colspan='5'>Error loading cheers: " +
                    escapeHtml(error.message) +
                    "</td></tr>";
                cheerCountBox.textContent = "Could not load cheers";
                return;
            }

            cachedShares = data || [];
            cheerCountBox.textContent = cachedShares.length + " cheers";

            if (!cachedShares.length) {
                table.innerHTML = "<tr><td colspan='5'>No cheers yet.</td></tr>";
                return;
            }

            const pinById = {};
            cachedPins.forEach((p) => {
                pinById[p.id] = p;
            });

            table.innerHTML = "";

            cachedShares.forEach((share) => {
                const pin = share.map_pins || pinById[share.pin_id];
                const dreamName = pin ? pin.name : "(deleted dream)";
                const dreamLoc = pin ? pin.location_name : "—";
                const cheeredBy = String(share.shared_by || "").trim() || "Anonymous";
                const isAnon = cheeredBy === "Anonymous";

                const row = document.createElement("tr");

                const tdDream = document.createElement("td");
                tdDream.textContent = dreamName;
                row.appendChild(tdDream);

                const tdLoc = document.createElement("td");
                tdLoc.textContent = dreamLoc;
                row.appendChild(tdLoc);

                const tdCheer = document.createElement("td");
                const input = document.createElement("input");
                input.type = "text";
                input.className = "cheer-name-input";
                input.value = cheeredBy;
                input.maxLength = 80;
                input.addEventListener("change", function () {
                    updateCheerName(share.id, input.value);
                });
                tdCheer.appendChild(input);
                if (isAnon) {
                    const hint = document.createElement("span");
                    hint.className = "cheer-name-hint";
                    hint.textContent = "Unnamed — edit to set name";
                    tdCheer.appendChild(hint);
                }
                row.appendChild(tdCheer);

                const tdTime = document.createElement("td");
                tdTime.textContent = new Date(share.created_at).toLocaleString();
                row.appendChild(tdTime);

                const tdDelete = document.createElement("td");
                const delBtn = document.createElement("button");
                delBtn.className = "btn-delete";
                delBtn.textContent = "Delete";
                delBtn.addEventListener("click", function () {
                    deleteCheer(share.id);
                });
                tdDelete.appendChild(delBtn);
                row.appendChild(tdDelete);

                table.appendChild(row);
            });
        }

        async function loadAll() {
            await loadPins();
        }

        loadAll();
    </script>

</body>
</html>
