<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream Map (embedded)</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/css/dream_map_embed.css">
</head>
<body>
<div class="embed-root" id="embed-root">
  <div class="embed-map-pane">
    <div id="map"></div>
  </div>
  <div class="embed-bottom-row">
    <section class="embed-names-pane" aria-label="Recent dreams">
      <div class="embed-pin-list-head-row">
        <span class="embed-pin-col embed-pin-col--dream">Dream</span>
        <span class="embed-pin-col embed-pin-col--place">Place</span>
        <span class="embed-pin-col embed-pin-col--cheer">Cheer</span>
      </div>
      <div class="embed-pin-list-viewport" id="embed-pin-viewport">
        <div class="embed-pin-list-tape" id="embed-pin-tape">
          <div class="embed-pin-segment" id="embed-pin-seg-a"></div>
          <div class="embed-pin-segment" id="embed-pin-seg-b" aria-hidden="true"></div>
        </div>
      </div>
    </section>
    <section class="embed-qr-pane" aria-label="Scan to add your dream">
      <h2 class="embed-qr-headline">Add Your Dream</h2>
      <div id="embed-qr-host" class="embed-qr-host"></div>
    </section>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="/js/dream_map/config.js"></script>
<script src="/js/dream_map/util.js"></script>
<script src="/js/dream_map/map-core.js"></script>
<script src="/js/dream_map/cheers.js"></script>
<script src="/js/dream_map/pins.js"></script>
<script src="/js/dream_map/mobile-cheer-ui.js"></script>
<script src="/js/dream_map/realtime.js"></script>
<script src="/js/dream_map/tv-spotlight.js"></script>
<script src="/js/dream_map/tv-names-tape.js"></script>
<script src="/js/dream_map/tv-qr-panel.js"></script>
<script src="/js/dream_map/tv-embed.js"></script>
<script src="/js/dream_map_shared.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  DreamMap.initEmbedded("map").catch(function (e) { console.error(e); });
});
</script>
</body>
</html>
